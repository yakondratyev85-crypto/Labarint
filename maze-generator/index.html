<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Maze Generator — SVG</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <h1>Генератор лабиринтов</h1>
    <p>Локальный генератор чистых SVG: без сборки, npm, сервера и внешних библиотек.</p>
  </header>

  <main class="app-shell">
    <aside class="controls" aria-label="Настройки лабиринта">
      <label>Maze Type
        <select id="mazeType">
          <option value="rect">Rectangular Maze</option>
          <option value="circle">Circular Maze</option>
          <option value="hex">Hex Maze</option>
          <option value="room">Room / Island Maze</option>
          <option value="shape">Shape Maze</option>
        </select>
      </label>

      <label id="shapeRow">Shape
        <select id="shapeType">
          <option value="circle">circle</option>
          <option value="heart">heart</option>
          <option value="star">star</option>
        </select>
      </label>

      <label>Difficulty
        <select id="difficulty">
          <option value="veryEasy">Very Easy</option>
          <option value="easy">Easy</option>
          <option value="medium" selected>Medium</option>
          <option value="hard">Hard</option>
          <option value="expert">Expert</option>
        </select>
      </label>

      <div class="grid-two">
        <label>Width / Size
          <input id="mazeWidth" type="number" min="6" max="80" value="24">
        </label>
        <label>Height
          <input id="mazeHeight" type="number" min="6" max="80" value="18">
        </label>
      </div>

      <label>Wall Thickness
        <input id="wallThickness" type="number" min="1" max="12" value="3">
      </label>

      <label>Seed
        <input id="seedInput" type="text" value="labyrinth-2026" autocomplete="off">
      </label>

      <button id="randomSeedBtn" type="button">Random Seed</button>
      <button id="generateBtn" class="primary" type="button">Generate</button>
      <div class="grid-two">
        <button id="showSolutionBtn" type="button">Show Solution</button>
        <button id="hideSolutionBtn" type="button">Hide Solution</button>
      </div>
      <button id="downloadBtn" type="button">Download SVG</button>
      <button id="downloadSolutionBtn" type="button">Download SVG with Solution</button>
    </aside>

    <section class="preview-card">
      <div id="svgPreview" class="svg-preview" aria-live="polite"></div>
    </section>
  </main>

  <footer id="mazeInfo" class="maze-info">Информация о лабиринте появится после генерации.</footer>

  <script src="app.js"></script>
</body>
</html>
